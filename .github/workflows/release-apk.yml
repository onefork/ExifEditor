name: Release APK

# 自动触发:
#   - push 到 main: 构建 APK 验证 (不发布 Release, 仅上传 artifact)
#   - 推 v* tag:    构建 APK 并发布到 GitHub Release
#   - workflow_dispatch: 手动触发 (同 main 行为, 仅构建)
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm ci

      # cap:sync = vite build && npx cap sync android
      # 默认 mode=production -> base='/', 适合 Capacitor WebView。
      - run: npm run cap:sync

      - name: Build debug & release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          # 重试 5 次规避 services.gradle.org 偶发连接拒绝；全部失败则 exit 1
          for i in 1 2 3 4 5; do
            ./gradlew assembleDebug assembleRelease --no-daemon && exit 0
            echo "Build attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "All 5 build attempts failed."
          exit 1

      - name: Collect APKs
        run: |
          mkdir -p apks
          cp android/app/build/outputs/apk/debug/*.apk apks/
          cp android/app/build/outputs/apk/release/*.apk apks/
          ls -la apks/

      # main 分支 / 手动触发: 仅作为 workflow artifact 上传, 不发 Release
      - name: Upload APKs as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: apks/*.apk
          retention-days: 14

      # tag 触发: 发布到 GitHub Release
      - name: Upload APKs to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apks/*.apk
