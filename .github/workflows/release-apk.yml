name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm ci

      # cap:sync = vite build && npx cap sync android
      # 默认 mode=production -> base='/', 适合 Capacitor WebView。
      - run: npm run cap:sync

      - name: Build debug & release APK
        working-directory: android
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p apks
          cp android/app/build/outputs/apk/debug/*.apk apks/
          cp android/app/build/outputs/apk/release/*.apk apks/
          ls -la apks/

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apks/*.apk
