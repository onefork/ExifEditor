name: Release APK

# 自动触发:
#   - push 到 main: 构建 APK 验证 (不发布 Release, 仅上传 artifact)
#   - 推 v* tag:    构建 APK 并发布到 GitHub Release
#   - workflow_dispatch: 手动触发 (同 main 行为, 仅构建)
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm ci

      # cap:sync = vite build && npx cap sync android
      # 默认 mode=production -> base='/', 适合 Capacitor WebView。
      - run: npm run cap:sync

      # 用 setup-gradle 缓存 Gradle 状态；同时预装一个 Gradle 版本，避免
      # gradlew 去 services.gradle.org 下载 (该域名在 runner 上偶发不可达)。
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug & release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          # 优先用 setup-gradle 预装的 gradle；回退到 ./gradlew
          if command -v gradle >/dev/null 2>&1; then
            gradle assembleDebug assembleRelease --no-daemon
          else
            ./gradlew assembleDebug assembleRelease --no-daemon
          fi

      - name: Collect APKs
        run: |
          mkdir -p apks
          cp android/app/build/outputs/apk/debug/*.apk apks/
          cp android/app/build/outputs/apk/release/*.apk apks/
          ls -la apks/

      # main 分支 / 手动触发: 仅作为 workflow artifact 上传, 不发 Release
      - name: Upload APKs as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: apks/*.apk
          retention-days: 14

      # tag 触发: 发布到 GitHub Release
      - name: Upload APKs to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apks/*.apk
